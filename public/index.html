<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>公众号导出 PDF</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;max-width:860px;margin:40px auto;padding:0 16px;line-height:1.4}
    .card{border:1px solid #e5e7eb;border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
    input{width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:12px;font-size:15px}
    button{padding:10px 14px;border:0;border-radius:12px;font-size:15px;cursor:pointer}
    button.primary{background:#111827;color:#fff}
    button:disabled{opacity:.6;cursor:not-allowed}
    .row{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
    .hint{color:#6b7280;font-size:13px;margin-top:10px}
    .log{margin-top:12px;color:#111827;font-size:13px;white-space:pre-wrap}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid #e5e7eb;font-size:12px;color:#374151}
    .footer{margin-top:16px;color:#6b7280;font-size:12px}
    code{background:#f3f4f6;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <h2>公众号文章导出 PDF（网页端） <span class="pill">Cloudflare Pages</span></h2>
  <div class="card">
    <div>粘贴公众号文章链接：</div>
    <input id="url" placeholder="https://mp.weixin.qq.com/s/xxxx 或 https://mp.weixin.qq.com/s?__biz=..." />
    <div class="row">
      <button class="primary" id="btn">生成并下载 PDF</button>
      <span id="status" class="hint"></span>
    </div>
    <div class="hint">
      说明：前端无法直接抓公众号内容（跨域限制）。本工具通过你部署的后端（Pages Functions）生成 PDF 并返回下载。
    </div>
    <div id="log" class="log"></div>

    <div class="footer">
      后端接口：<code>/api/pdf?url=...</code>　|　如遇登录/验证，需改用“复用登录态”的方案（可再升级）。
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);

function setBusy(busy, text="") {
  $("btn").disabled = busy;
  $("status").textContent = text;
}

$("btn").onclick = async () => {
  const url = $("url").value.trim();
  if (!/^https?:\/\/mp\.weixin\.qq\.com\/s/.test(url)) {
    alert("请输入 mp.weixin.qq.com 的文章链接");
    return;
  }

  setBusy(true, "生成中…（通常 5~20 秒）");
  $("log").textContent = "";

  try {
    const api = `/api/pdf?url=${encodeURIComponent(url)}`;
    const res = await fetch(api, { method: "GET" });
    if (!res.ok) {
      const msg = await res.text();
      throw new Error(msg || `HTTP ${res.status}`);
    }

    const blob = await res.blob();
    const filename = res.headers.get("x-filename") || "wechat.pdf";

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);

    setBusy(false, "完成 ✅ 已下载");
  } catch (e) {
    $("log").textContent = String(e?.message || e);
    setBusy(false, "失败 ❌");
  }
};
</script>
</body>
</html>
